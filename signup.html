<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<title>회원가입 — 한끗</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div data-mast></div>
  <div class="wrap">
    <div class="auth-card">
      <span class="kicker">한끗 계정</span>
      <h1>한끗 시작하기</h1>
      <p class="sub">트렌드 저장 · 후기 작성 · 내 기록을 모아보세요.</p>
      <form id="signupForm" novalidate>
        <div class="form-err" id="formErr"></div>
        <div class="field"><label for="name">이름 / 닉네임</label>
          <input id="name" type="text" autocomplete="nickname" placeholder="후기에 표시될 이름" /></div>
        <div class="field"><label for="email">이메일</label>
          <input id="email" type="email" autocomplete="email" placeholder="you@example.com" /></div>
        <div class="field"><label for="pw">비밀번호</label>
          <input id="pw" type="password" autocomplete="new-password" placeholder="6자 이상" /></div>
        <button class="btn accent block" type="submit">가입하고 시작하기</button>
      </form>
      <div class="alt">이미 계정이 있으세요? <a id="toLogin" href="login.html">로그인</a></div>
    </div>
  </div>

<script src="assets/app.js"></script>
<script>
  H.boot();
  const next = (function(){ const n=H.param('next'); return (n && /\.html(\?|#|$)/.test(n) && !/^https?:\/\//.test(n)) ? n : 'index.html'; })();
  if(H.user()){ location.replace(next); }
  H.q('#toLogin').href = `login.html?next=${encodeURIComponent(next)}`;

  H.q('#signupForm').addEventListener('submit', (e)=>{
    e.preventDefault();
    const err=H.q('#formErr'); err.classList.remove('show');
    const res=H.signup({ name:H.q('#name').value, email:H.q('#email').value, password:H.q('#pw').value });
    if(!res.ok){ err.textContent=res.error; err.classList.add('show'); return; }
    location.href = next;
  });
</script>
</body>
</html>
