<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<title>한끗 — 트렌드 분석</title>
<meta name="description" content="광고 의심도·실제 후기 신뢰도·만족도 분석. 추정치이며 확정 판정이 아닙니다." />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="assets/styles.css" />
<style>
  .crumb{font-size:13.5px;color:var(--ink-2);margin:18px 0 14px}
  .crumb a{color:var(--accent);text-decoration:none;font-weight:700}
  .d-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:14px 0 4px}
  .d-title{font-size:30px;font-weight:900;letter-spacing:-0.035em;margin:10px 0 6px;line-height:1.15}
  .d-def{font-size:18px;font-weight:700;color:var(--body);line-height:1.5;margin:0 0 10px;word-break:keep-all}
  /* 이렇게 써요 — 채팅 말풍선 느낌 */
  .usage{margin:16px 0;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .usage .u-label{font-size:12.5px;font-weight:800;color:var(--ink-2);letter-spacing:.02em}
  .usage .u-ex{margin:7px 0 0;font-size:16.5px;font-weight:700;color:var(--ink);line-height:1.5;word-break:keep-all}
  .d-actions{display:flex;gap:9px;margin:14px 0 6px}
  .stage-box{border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:var(--r);
    padding:13px 15px;margin:16px 0}
  .stage-box .sb-k{font-size:13.5px;color:var(--ink-2);font-weight:700}
  .stage-box .sb-v{font-size:18px;font-weight:900;margin-top:2px}
  .related{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0}
  .related a{text-decoration:none;color:inherit}
  .related .cover{min-height:96px}
  .related .r-t{font-size:14.5px;font-weight:800;margin-top:6px}
  @media(max-width:520px){.related{grid-template-columns:1fr}}
  .rv-form{border:1px solid var(--line);border-radius:12px;padding:16px 16px 18px;margin:14px 0;background:var(--paper-2)}
  /* 데스크탑: 본문 폭을 넓혀 좌우 여백 축소(모바일은 기존대로 풀폭) */
  @media(min-width:820px){ .wrap.reading{max-width:920px} }
  /* 미디어 블록(영상·이미지) */
  .media{margin:22px 0}
  .media-h{font-size:12.5px;font-weight:800;letter-spacing:.05em;color:var(--accent);margin:0 0 8px;text-transform:uppercase}
  .embed-frame{position:relative;width:100%;max-width:760px;aspect-ratio:16/9;border-radius:var(--r);
    overflow:hidden;background:var(--ink);border:1px solid var(--line)}
  .embed-frame.vertical{aspect-ratio:9/16;max-width:330px}
  .embed-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .embed-cap{font-size:13px;color:var(--ink-2);margin-top:8px}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
  .gallery a{display:block;aspect-ratio:4/3;border:1px solid var(--line);border-radius:var(--r);
    overflow:hidden;background:var(--paper-2)}
  .gallery img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s}
  .gallery a:hover img{transform:scale(1.04)}
  @media(max-width:520px){ .gallery{grid-template-columns:1fr 1fr;gap:8px} .embed-frame.vertical{max-width:100%} }
  /* 블로그형 본문(article): 짧은 문단·소제목·강조로 가독성 있게 */
  .article{margin:24px 0;max-width:720px}
  .article .art-h{font-size:19px;font-weight:900;letter-spacing:-0.025em;margin:24px 0 8px;line-height:1.3}
  .article .art-p{font-size:16px;line-height:1.8;color:var(--body);margin:0 0 15px;text-wrap:pretty;word-break:keep-all}
  .article .art-q{margin:18px 0;padding:11px 16px;border-left:3px solid var(--accent);
    background:var(--paper-2);border-radius:0 var(--r) var(--r) 0;font-weight:800;color:var(--ink);
    line-height:1.6;word-break:keep-all}
  .article .art-ul{margin:8px 0 16px;padding-left:18px}
  .article .art-ul li{font-size:15.5px;line-height:1.75;margin:5px 0;color:var(--body);word-break:keep-all}
  /* 프롬프트 박스: 라벨+복사버튼 헤더 / 긴 프롬프트 본문(줄바꿈 보존) */
  .prompt-box .pb-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
    white-space:normal;margin-bottom:9px}
  .prompt-box .pb-top .pb-label{margin-bottom:0;flex:1}
  .prompt-box .pb-copy{flex:none;cursor:pointer;background:#e8a33d;color:#211d18;border:0;border-radius:6px;
    font-size:12.5px;font-weight:800;padding:6px 12px;white-space:nowrap;font-family:var(--sans)}
  .prompt-box .pb-copy:hover{opacity:.9}
  .prompt-box .pb-text{white-space:pre-wrap;word-break:break-word}
  /* 어디서 사 먹지? — 파는 가게 목록 */
  .shops{list-style:none;margin:8px 0 4px;padding:0}
  .shops .sh-row{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 10px;padding:13px 2px;border-bottom:1px solid var(--line)}
  .shops .sh-row:last-child{border-bottom:0}
  .shops .sh-main{display:flex;align-items:baseline;gap:9px;flex:1;min-width:0}
  .shops .sh-name{font-size:16.5px;font-weight:800;color:var(--ink)}
  .shops .sh-rep{display:inline-block;font-size:11px;font-weight:800;color:var(--green);
    border:1px solid var(--green);border-radius:5px;padding:1px 7px;white-space:nowrap;line-height:1.5}
  .shops .sh-area{font-size:13px;color:var(--ink-2);font-weight:700;white-space:nowrap}
  .shops .sh-link{font-size:13px;font-weight:800;color:var(--accent);text-decoration:none;white-space:nowrap}
  .shops .sh-note{flex-basis:100%;font-size:14px;color:var(--body);line-height:1.55;word-break:keep-all;margin-top:1px}
  .shops-note{font-size:12.5px;color:var(--ink-2);margin:9px 0 2px}
</style>
</head>
<body>
  <div data-mast></div>
  <div class="wrap reading"><div id="main"></div></div>

<script src="data/trends.js"></script>
<script src="assets/app.js"></script>
<script>
  H.boot();
  const id = H.param('id');
  const t = H.trend(id);
  const main = H.q('#main');

  if(!t){
    main.innerHTML = `<div class="empty" style="margin-top:50px">
      <div class="e-mark">!</div><h3>분석을 찾을 수 없어요</h3>
      <p>주소가 바뀌었거나 아직 올라오지 않은 항목이에요.</p>
      <a class="btn primary" href="index.html">홈으로</a></div>`;
  } else {
    render();
  }

  function scoresBlock(){
    if(t.type!=='신뢰분석') return `
      <div class="stage-box">
        <div class="sb-k">유행 단계</div>
        <div class="sb-v">${H.esc(t.stage)}</div>
        <div class="muted" style="font-size:14px;margin-top:4px">${H.esc(t.stageMsg)}</div>
      </div>`;
    const R = t.reasons || {};
    return `<div class="scores">
      <div class="score ad"><div class="s-label">광고 의심도</div>
        <div class="s-num">${t.ad}</div><div class="s-band">${H.bandTxt(t.ad)} · 높을수록 광고 가능성</div>
        <div class="track"><i style="width:${t.ad}%"></i></div>
        ${R.ad?`<div class="s-why"><b>왜 이 점수?</b> ${H.esc(R.ad)}</div>`:''}</div>
      <div class="score trust"><div class="s-label">실제 후기 신뢰도</div>
        <div class="s-num">${t.trust}</div><div class="s-band">${H.bandTxt(t.trust)} · 높을수록 믿을 만함</div>
        <div class="track"><i style="width:${t.trust}%"></i></div>
        ${R.trust?`<div class="s-why"><b>왜 이 점수?</b> ${H.esc(R.trust)}</div>`:''}</div>
    </div>
    <div style="font-size:14.5px;margin:2px 0 4px">만족도 <span class="sat-badge sat-${t.sat}">${({pos:'긍정',neg:'부정',mix:'혼재'})[t.sat]}</span> <span class="muted">${H.esc(t.satTxt)}</span></div>
    ${R.sat?`<div class="sat-why"><b>근거</b> ${H.esc(R.sat)}</div>`:''}`;
  }

  // 영상 임베드(유튜브/틱톡) — 데이터에 t.video 있을 때만
  function videoBlock(){
    const v=t.video; if(!v) return '';
    let src='', vertical=false;
    if(v.youtube) src=`https://www.youtube-nocookie.com/embed/${v.youtube}`;
    else if(v.tiktok){ src=`https://www.tiktok.com/embed/v2/${v.tiktok}`; vertical=true; }
    else if(v.url) src=v.url;
    if(!src) return '';
    return `<div class="media">
      <div class="media-h">▶ 지금 뜨는 영상</div>
      <div class="embed-frame ${vertical?'vertical':''}">
        <iframe src="${src}" title="${H.esc(t.title)} 영상" loading="lazy"
          referrerpolicy="strict-origin-when-cross-origin"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen></iframe>
      </div>
      ${v.cap?`<div class="embed-cap">${H.esc(v.cap)}</div>`:''}
    </div>`;
  }

  // 대표 이미지 갤러리 — t.images + (영상 있으면 유튜브 썸네일 자동 추가). 깨진 이미지는 onerror로 제거
  function galleryBlock(){
    const all=[...(t.images||[])];
    if(t.video&&t.video.youtube) all.unshift(`https://i.ytimg.com/vi/${t.video.youtube}/hqdefault.jpg`);
    const uniq=[...new Set(all.map(x=>typeof x==='string'?x:x.u))].filter(Boolean);
    if(!uniq.length) return '';
    return `<div class="media">
      <div class="media-h">📷 대표 이미지</div>
      <div class="gallery">${uniq.map(u=>`<a href="${u}" target="_blank" rel="noopener">
        <img src="${u}" alt="${H.esc(t.title)}" loading="lazy" referrerpolicy="no-referrer"
          onerror="this.closest('a').remove()"></a>`).join('')}</div>
    </div>`;
  }

  // 블로그형 본문(article): [["h","소제목"],["p","문단"],["q","강조"],["ul",["..",".."]]]
  function articleBlock(){
    const a = t.article; if(!a || !a.length) return '';
    const body = a.map(b=>{
      const type=b[0], c=b[1];
      if(type==='h') return `<h3 class="art-h">${H.esc(c)}</h3>`;
      if(type==='q') return `<blockquote class="art-q">${H.esc(c)}</blockquote>`;
      if(type==='ul') return `<ul class="art-ul">${(c||[]).map(li=>`<li>${H.esc(li)}</li>`).join('')}</ul>`;
      return `<p class="art-p">${H.esc(c)}</p>`;
    }).join('');
    return `<div class="article"><div class="media-h">📝 자세히 읽기</div>${body}</div>`;
  }

  // 어디서 사 먹지? — t.shops 있을 때만. [{name, area?, url?, note?}]
  function shopsBlock(){
    const s = t.shops; if(!s || !s.length) return '';
    const rows = s.map(sh=>{
      const rep = sh.rep?`<span class="sh-rep">${H.esc(sh.rep)}</span>`:'';
      const area = sh.area?`<span class="sh-area">${H.esc(sh.area)}</span>`:'';
      const link = sh.url?`<a class="sh-link" href="${sh.url}" target="_blank" rel="noopener">보기 ↗</a>`:'';
      const note = sh.note?`<span class="sh-note">${H.esc(sh.note)}</span>`:'';
      return `<li class="sh-row"><div class="sh-main"><span class="sh-name">${H.esc(sh.name)}</span>${rep}${area}</div>${link}${note}</li>`;
    }).join('');
    return `<div class="sec-head"><span class="no">▣</span><h2>어디서 사 먹지?</h2></div>
      <ul class="shops">${rows}</ul>
      <div class="shops-note">맛집으로 소문난 곳 위주로 골랐어요. 메뉴·가격·영업은 방문 전 다시 확인하세요.</div>`;
  }

  function render(){
    const saved = H.isSaved(t.id);
    const related = H.TRENDS.filter(x=>x.id!==t.id).slice(0,2);
    main.innerHTML = `
      <div class="crumb"><a href="index.html">홈</a> › ${H.esc(t.cat)}</div>
      ${H.coverHTML(t,{tall:true})}
      <div class="d-head"><span class="kicker">${H.esc(t.cat)} · ${H.esc(t.buzz)}</span></div>
      <h1 class="d-title">${H.esc(t.title)}</h1>
      ${t.def?`<p class="d-def">${H.esc(t.def)}</p>`:''}
      <div><span class="label ${t.labelCls}">${H.esc(t.label)}</span></div>
      <div class="tags">
        <a class="tag-chip date" href="index.html?date=${encodeURIComponent(t.collectedAt||t.analyzedAt)}">📅 ${H.esc(t.collectedAt||t.analyzedAt)} 수집</a>
        ${(t.tags||[]).map(tg=>`<a class="tag-chip" href="index.html?tag=${encodeURIComponent(tg)}">#${H.esc(tg)}</a>`).join('')}
      </div>
      <div class="freshline">분석일 ${H.fmtISO(t.analyzedAt)} ${H.freshChip(t.analyzedAt)} · 오늘 ${H.todayStr()} 기준</div>
      ${H.freshness(t.analyzedAt).cls==='stale' ? `<div class="stale-banner">⚠ 이 분석은 ${H.daysSince(t.analyzedAt)}일 전 기준이에요. 유행은 빨리 바뀌니 방문 전 최신 상황을 다시 확인하세요.</div>` : ''}
      <div class="d-actions">
        <button class="save-btn ${saved?'on':''}" id="saveBtn">${saved?'★ 저장됨':'☆ 저장'}</button>
        <button class="save-btn" id="shareBtn">↗ 공유</button>
      </div>
      ${videoBlock()}
      ${scoresBlock()}
      ${t.pull?`<blockquote class="pull">${H.esc(t.pull)}</blockquote>`:''}
      ${galleryBlock()}
      ${t.prompt?`<div class="prompt-box">
        <div class="pb-top">
          <span class="pb-label">📋 프롬프트 · ${t.prompt.split('\n').length}줄 — 복사해서 ChatGPT·제미나이·미드저니에 붙여넣기</span>
          <button class="pb-copy" type="button" onclick="navigator.clipboard.writeText(this.closest('.prompt-box').querySelector('.pb-text').innerText).then(()=>{this.textContent='복사됨 ✓';setTimeout(()=>this.textContent='📋 복사',1500)}).catch(()=>{this.textContent='복사 실패'})">📋 복사</button>
        </div>
        <div class="pb-text">${H.esc(t.prompt)}</div>
      </div>`:''}
      ${t.example?`<div class="usage"><div class="u-label">💬 이렇게 써요</div><p class="u-ex">"${H.esc(t.example)}"</p></div>`:''}
      ${t.pureKorean?`<div class="pure-kr">🌸 <b>예쁜 우리말로 바꾼다면</b> · ${H.esc(t.pureKorean)}</div>`:''}
      <p class="verdict">${H.esc(t.verdict)}</p>
      ${articleBlock()}
      ${shopsBlock()}
      <div class="sec-head"><span class="no">·</span><h2>이런 분께</h2></div>
      <ul class="recs">${t.recs.map(r=>`<li><span>${H.esc(r[0])}</span><span class="v ${r[2]?'ok':''}">${H.esc(r[1])}</span></li>`).join('')}</ul>
      <details class="src"><summary>참고 출처 ${t.src.length}개</summary>
        <div class="src-list">${t.src.map(s=>`<a href="${s[1]}" target="_blank" rel="noopener">${H.esc(s[0])}</a>`).join('<br>')}</div></details>

      <div class="sec-head" id="reviews"><span class="no">★</span><h2>방문자 후기</h2><span class="note" id="rvAvg"></span></div>
      <div id="rvForm"></div>
      <div class="reviews" id="rvList"></div>

      <div class="sec-head"><span class="no">→</span><h2>함께 보기</h2></div>
      <div class="related">${related.map(x=>`<a href="trend.html?id=${x.id}">${H.coverHTML(x)}<div class="r-t">${H.esc(x.title)}</div></a>`).join('')}</div>

      <div class="disc">⚠️ 점수는 공개 정보 기반 <b>추정치</b>이며 확정 판정이 아닙니다. 방문자 후기는 이용자가 직접 작성한 내용입니다.</div>
      <footer class="site"><div class="fwm">한<b>끗</b></div>AZ와 MZ는 한 끗 차이 · 트렌드 번역소</footer>`;

    H.q('#saveBtn').onclick = ()=>{
      const r = H.toggleSave(t.id);
      if(r.needAuth){ H.toast('저장하려면 로그인이 필요해요'); location.href=`login.html?next=${encodeURIComponent(location.href)}`; return; }
      const b=H.q('#saveBtn'); b.classList.toggle('on', r.saved);
      b.textContent = r.saved?'★ 저장됨':'☆ 저장'; H.toast(r.saved?'저장했어요':'저장을 해제했어요');
    };
    H.q('#shareBtn').onclick = async ()=>{
      const text=`[한끗] ${t.title} — ${t.type==='신뢰분석'?`광고 ${t.ad}/신뢰 ${t.trust}`:t.stage} · ${t.label}`;
      const url=location.href;
      if(navigator.share){ try{ await navigator.share({title:'한끗',text,url}); }catch(e){} }
      else { try{ await navigator.clipboard.writeText(text+' '+url); H.toast('링크를 복사했어요'); }catch(e){ prompt('복사해서 공유하세요:', text+' '+url); } }
    };
    renderReviews();
    renderForm();
  }

  function renderReviews(){
    const rs = H.reviews(t.id);
    const avg = H.avgRating(t.id);
    H.q('#rvAvg').innerHTML = avg ? `평균 <span class="stars">${H.starHTML(avg)}</span> ${avg.toFixed(1)} · ${rs.length}개` : '아직 후기 없음';
    const list = H.q('#rvList');
    if(!rs.length){ list.innerHTML = `<div class="empty"><div class="e-mark">★</div><h3>첫 후기를 남겨보세요</h3><p>실제 방문·구매 경험이 다음 사람에게 가장 큰 도움이 돼요.</p></div>`; return; }
    list.innerHTML = rs.map(r=>`<div class="rv">
      <div class="rv-top"><span class="rv-who">${H.esc(r.name)}</span><span class="stars">${H.starHTML(r.rating)}</span><span class="rv-date">${H.fmtDate(r.ts)}</span></div>
      <div class="rv-text">${H.esc(r.text)}</div></div>`).join('');
  }

  function renderForm(){
    const box = H.q('#rvForm');
    const u = H.user();
    if(!u){
      box.innerHTML = `<div class="rv-form" style="text-align:center">
        <p class="muted" style="margin:0 0 12px;font-size:15px">로그인하면 후기를 남길 수 있어요.</p>
        <a class="btn primary" href="login.html?next=${encodeURIComponent(location.href)}">로그인하고 후기 쓰기</a></div>`;
      return;
    }
    box.innerHTML = `<div class="rv-form">
      <div style="font-weight:800;font-size:15px;margin-bottom:8px">${H.esc(u.name)}님의 후기</div>
      <div class="star-input" id="starIn">${[1,2,3,4,5].map(n=>`<span data-n="${n}">★</span>`).join('')}</div>
      <div class="field" style="margin-top:10px"><textarea id="rvText" rows="3" placeholder="맛·가격·웨이팅·재방문 의사 등 실제 경험을 적어주세요 (5자 이상)"></textarea></div>
      <div class="form-err" id="rvErr"></div>
      <button class="btn accent block" id="rvSubmit">후기 등록</button></div>`;
    let rating=0;
    const stars=H.qa('#starIn span');
    stars.forEach(s=>{
      s.onmouseenter=()=>paint(Number(s.dataset.n));
      s.onclick=()=>{ rating=Number(s.dataset.n); paint(rating); };
    });
    H.q('#starIn').onmouseleave=()=>paint(rating);
    function paint(n){ stars.forEach(s=> s.classList.toggle('on', Number(s.dataset.n)<=n)); }
    H.q('#rvSubmit').onclick=()=>{
      const err=H.q('#rvErr'); err.classList.remove('show');
      const res=H.addReview(t.id,{rating,text:H.q('#rvText').value});
      if(res.needAuth){ location.href=`login.html?next=${encodeURIComponent(location.href)}`; return; }
      if(!res.ok){ err.textContent=res.error; err.classList.add('show'); return; }
      H.toast('후기를 등록했어요. 고마워요!');
      renderReviews(); renderForm();
    };
  }
</script>
</body>
</html>
