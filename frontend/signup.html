<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<title>회원가입 — 한끗</title>
<meta name="description" content="이 브라우저에만 저장되는 한끗 로컬 계정을 만들어 트렌드 저장과 후기 작성을 사용합니다." />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="한끗" />
<meta property="og:locale" content="ko_KR" />
<meta property="og:title" content="회원가입 — 한끗" />
<meta property="og:description" content="서버에 저장되지 않는 한끗 로컬 계정으로 저장과 후기를 이 브라우저에 남기세요." />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="회원가입 — 한끗" />
<meta name="twitter:description" content="서버에 저장되지 않는 한끗 로컬 계정으로 저장과 후기를 이 브라우저에 남기세요." />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div data-mast></div>
  <div class="wrap">
    <div class="auth-card">
      <span class="kicker">한끗 계정</span>
      <h1>한끗 시작하기</h1>
      <p class="sub">트렌드 저장 · 후기 작성 · 내 기록을 모아보세요.</p>
      <p class="local-note"><strong>로컬 계정</strong>입니다. 계정 정보와 저장/후기는 이 브라우저의 localStorage에만 저장됩니다. 공개 서버 저장이나 기기 간 동기화는 제공하지 않습니다.</p>
      <form id="signupForm" novalidate>
        <div class="form-err" id="formErr"></div>
        <div class="field"><label for="name">이름 / 닉네임</label>
          <input id="name" type="text" autocomplete="nickname" placeholder="후기에 표시될 이름" /></div>
        <div class="field"><label for="email">이메일</label>
          <input id="email" type="email" autocomplete="email" placeholder="you@example.com" /></div>
        <div class="field"><label for="pw">비밀번호</label>
          <input id="pw" type="password" autocomplete="new-password" placeholder="6자 이상" /></div>
        <button class="btn accent block" type="submit">가입하고 시작하기</button>
      </form>
      <div class="alt">이미 계정이 있으세요? <a id="toLogin" href="login.html">로그인</a></div>
    </div>
  </div>

<script src="assets/app.js"></script>
<script>
  H.boot();
  const next = H.safeNext(H.param('next'), 'index.html');
  (async ()=>{
    if(await H.resolve(H.user())){ location.replace(next); }
  })();
  H.q('#toLogin').href = H.loginHref(next);

  H.q('#signupForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const err=H.q('#formErr'); err.classList.remove('show');
    const res=await H.resolve(H.signup({ name:H.q('#name').value, email:H.q('#email').value, password:H.q('#pw').value }));
    if(!res.ok){ err.textContent=res.error; err.classList.add('show'); return; }
    location.href = next;
  });
</script>
</body>
</html>
