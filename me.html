<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light" />
<title>내 한끗 — 한끗</title>
<link rel="stylesheet" href="assets/styles.css" />
<style>
  .me-hd{display:flex;align-items:center;gap:14px;margin:30px 0 6px}
  .me-hd .big-av{width:52px;height:52px;border-radius:50%;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}
  .me-hd h1{font-size:24px;font-weight:900;margin:0;letter-spacing:-0.03em}
  .me-hd .em{font-size:13.5px;color:var(--ink-2)}
  .me-hd .logout{margin-left:auto;font-size:13.5px;font-weight:800;color:var(--ink-2);
    background:none;border:1.5px solid var(--line);border-radius:var(--r);padding:8px 12px;cursor:pointer}
  .savedrow{display:grid;grid-template-columns:64px 1fr auto;gap:13px;align-items:center;
    padding:12px 4px;border-bottom:1px solid var(--line);text-decoration:none;color:inherit}
  .savedrow:hover{background:var(--paper-2)}
  .savedrow .cover{min-height:48px;height:48px;padding:0;border-radius:5px}
  .savedrow .cover .c-title{font-size:13px;padding:4px 6px;text-shadow:none}
  .savedrow .cover .c-kicker,.savedrow .cover .c-buzz,.savedrow .cover .c-stamp{display:none}
  .savedrow .s-t{font-size:15.5px;font-weight:800;letter-spacing:-0.02em}
  .savedrow .s-l{font-size:13.5px;color:var(--ink-2)}
  .savedrow .unsave{font-size:13.5px;color:var(--faint);background:none;border:none;cursor:pointer}
  .myrv{border-top:1px solid var(--line);padding:13px 0}
  .myrv a{font-weight:800;text-decoration:none;color:var(--ink)}
  .myrv .meta{font-size:13px;color:var(--faint);margin-left:8px}
  .myrv .txt{font-size:14.5px;color:#2c2a24;margin-top:4px}
</style>
</head>
<body>
  <div data-mast></div>
  <div class="wrap reading"><div id="main"></div></div>

<script src="data/trends.js"></script>
<script src="assets/app.js"></script>
<script>
  H.boot();
  const u = H.user();
  if(!u){ location.replace('login.html?next=me.html'); }
  else render();

  function render(){
    const main = H.q('#main');
    main.innerHTML = `
      <div class="me-hd">
        <span class="big-av">${H.esc(u.name.slice(0,1))}</span>
        <div><h1>${H.esc(u.name)}님의 한끗</h1><div class="em">${H.esc(u.email)}</div></div>
        <button class="logout" id="logout">로그아웃</button>
      </div>

      <div class="sec-head"><span class="no">★</span><h2>저장한 트렌드</h2><span class="note" id="savedCount"></span></div>
      <div id="savedList"></div>

      <div class="sec-head"><span class="no">✎</span><h2>내가 쓴 후기</h2><span class="note" id="rvCount"></span></div>
      <div id="myReviews"></div>

      <footer class="site"><div class="fwm">한<b>끗</b></div>AZ와 MZ는 한 끗 차이 · 트렌드 번역소</footer>`;

    H.q('#logout').onclick = ()=>{ H.logout(); H.toast('로그아웃했어요'); setTimeout(()=>location.href='index.html',400); };
    renderSaved(); renderMyReviews();
  }

  function renderSaved(){
    const ids = H.saves();
    const items = ids.map(H.trend).filter(Boolean);
    H.q('#savedCount').textContent = items.length ? `${items.length}개` : '';
    const box = H.q('#savedList');
    if(!items.length){ box.innerHTML = `<div class="empty"><div class="e-mark">★</div><h3>아직 저장한 트렌드가 없어요</h3><p>분석을 보다가 ☆ 저장을 누르면 여기에 모여요.</p><a class="btn primary" href="index.html">분석 둘러보기</a></div>`; return; }
    box.innerHTML = items.map(t=>`
      <a class="savedrow" href="trend.html?id=${t.id}">
        ${H.coverHTML(t)}
        <span><span class="s-t">${H.esc(t.title)}</span><br><span class="s-l">${H.esc(t.label)} ${H.freshChip(t.analyzedAt)}</span></span>
        <button class="unsave" data-id="${t.id}">저장 해제</button>
      </a>`).join('');
    H.qa('.unsave').forEach(b=> b.onclick=(e)=>{ e.preventDefault(); H.toggleSave(b.dataset.id); H.toast('저장을 해제했어요'); renderSaved(); });
  }

  function renderMyReviews(){
    const rs = H.myReviews();
    H.q('#rvCount').textContent = rs.length ? `${rs.length}개` : '';
    const box = H.q('#myReviews');
    if(!rs.length){ box.innerHTML = `<div class="empty"><div class="e-mark">✎</div><h3>아직 쓴 후기가 없어요</h3><p>다녀온 곳의 솔직한 한 줄이 다음 사람을 살립니다.</p><a class="btn primary" href="index.html">후기 남기러 가기</a></div>`; return; }
    box.innerHTML = rs.map(r=>{ const t=H.trend(r.trendId); return `<div class="myrv">
      <a href="trend.html?id=${r.trendId}">${t?H.esc(t.title):r.trendId}</a>
      <span class="stars">${H.starHTML(r.rating)}</span><span class="meta">${H.fmtDate(r.ts)}</span>
      <div class="txt">${H.esc(r.text)}</div></div>`; }).join('');
  }
</script>
</body>
</html>
